<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Ticket — Customer Success FTE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ========== NAVIGATION ========== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="currentColor"/>
                    <path d="M8 16L14 22L24 10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>CustomerSuccess<span class="logo-accent">FTE</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html#features" class="nav-link">Features</a>
                <a href="index.html#channels" class="nav-link">Channels</a>
                <a href="ticket-status.html" class="nav-link nav-link-cta">Track Ticket</a>
                <a href="index.html#support-form" class="nav-link">Get Support</a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ========== TICKET STATUS PAGE ========== -->
    <div class="ticket-page">
        <div class="ticket-card">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <h2>Track Your Ticket</h2>
            <p>Enter your ticket ID to check the current status.</p>

            <form id="ticketLookupForm" class="ticket-lookup-form" novalidate>
                <div class="form-group">
                    <label for="lookupTicketId">Ticket ID <span class="required">*</span></label>
                    <input type="text" id="lookupTicketId" name="ticketId" placeholder="TKT-2026-XXXXXX" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="lookupEmail">Email Address <span class="optional">(optional)</span></label>
                    <input type="email" id="lookupEmail" name="email" placeholder="john@example.com" autocomplete="email">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Check Status
                </button>
            </form>

            <div class="ticket-error" id="ticketError"></div>
            <div class="ticket-result" id="ticketResult"></div>

            <div style="margin-top:24px;text-align:center;">
                <a href="index.html#support-form" style="font-size:14px;color:#3B82F6;font-weight:500;">
                    ← Back to Support Form
                </a>
            </div>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="footer" style="padding:32px 0;">
        <div class="container" style="text-align:center;">
            <p>&copy; 2026 CustomerSuccessFTE. Built following the Agent Maturity Model.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
