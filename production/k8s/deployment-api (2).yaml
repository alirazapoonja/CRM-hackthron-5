---
# =============================================================================
# API DEPLOYMENT
# =============================================================================
# Deploys the FastAPI application that handles:
# - Webhook endpoints (Gmail, WhatsApp)
# - Web form submissions
# - Customer/conversation lookups
# - Metrics endpoints
#
# Features:
# - Rolling updates with zero downtime
# - Health checks (liveness, readiness, startup)
# - Resource limits and requests
# - Pod disruption budget for high availability

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-api
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: api
    version: v1
spec:
  # Replicas managed by HPA (see hpa.yaml)
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure zero downtime
  selector:
    matchLabels:
      app: customer-success-fte
      component: api
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Service account for pod identity (if using workload identity)
      serviceAccountName: fte-api-sa
      
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Image pull secrets (for private registry)
      # imagePullSecrets:
      #   - name: fte-registry-secret
      
      # Init containers - wait for dependencies
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at $(DB_HOST):$(DB_PORT)..."
              until nc -z $DB_HOST $DB_PORT; do
                sleep 2
              done
              echo "Database is ready!"
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
        
        # Wait for Kafka to be ready
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka at $(KAFKA_BOOTSTRAP_SERVERS)..."
              KAFKA_HOST=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d: -f1)
              KAFKA_PORT=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d: -f2)
              until nc -z $KAFKA_HOST $KAFKA_PORT; do
                sleep 2
              done
              echo "Kafka is ready!"
          envFrom:
            - configMapRef:
                name: fte-config
      
      # Main containers
      containers:
        # API container
        - name: api
          image: company-registry/customer-success-fte-api:v1.0.0
          imagePullPolicy: Always
          
          # Exposed port
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # Environment variables
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
          
          # Health checks
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # Allow up to 150 seconds for startup
          
          # Resource limits and requests
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: secrets-volume
              mountPath: /app/secrets
              readOnly: true
          
          # Logging
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Initiating graceful shutdown..."
                    sleep 10  # Allow in-flight requests to complete
                    echo "Shutdown complete"
        
        # Sidecar: Prometheus metrics exporter (optional)
        - name: metrics-exporter
          image: prom/statsd-exporter:v0.26.0
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      
      # Volumes
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: secrets-volume
          secret:
            secretName: fte-secrets
            defaultMode: 0400
      
      # Node selection and affinity
      affinity:
        # Spread pods across nodes for high availability
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: customer-success-fte
                    component: api
                topologyKey: kubernetes.io/hostname
      
      # Tolerations (if using taints on nodes)
      # tolerations:
      #   - key: "dedicated"
      #     operator: "Equal"
      #     value: "fte"
      #     effect: "NoSchedule"
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
      
      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "5"
