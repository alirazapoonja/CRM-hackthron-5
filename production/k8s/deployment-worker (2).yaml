---
# =============================================================================
# WORKER DEPLOYMENT
# =============================================================================
# Deploys the Unified Message Processor worker that:
# - Consumes messages from Kafka topic 'fte.tickets.incoming'
# - Resolves customer identity (cross-channel matching)
# - Runs the Customer Success Agent
# - Stores responses and metrics
# - Handles errors with dead-letter queue
#
# Features:
# - Horizontal scaling based on Kafka lag
# - Graceful shutdown for message processing completion
# - Resource isolation from API
# - Pod disruption budget for high availability

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: worker
    version: v1
spec:
  # Replicas managed by HPA (see hpa.yaml)
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1  # Allow one unavailable during update
  selector:
    matchLabels:
      app: customer-success-fte
      component: worker
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fte-worker-sa
      
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # imagePullSecrets:
      #   - name: fte-registry-secret
      
      # Init containers - wait for dependencies
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at $(DB_HOST):$(DB_PORT)..."
              until nc -z $DB_HOST $DB_PORT; do
                sleep 2
              done
              echo "Database is ready!"
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
        
        # Wait for Kafka to be ready
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka at $(KAFKA_BOOTSTRAP_SERVERS)..."
              KAFKA_HOST=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d: -f1)
              KAFKA_PORT=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d: -f2)
              until nc -z $KAFKA_HOST $KAFKA_PORT; do
                sleep 2
              done
              echo "Kafka is ready!"
          envFrom:
            - configMapRef:
                name: fte-config
      
      # Main containers
      containers:
        # Worker container
        - name: worker
          image: company-registry/customer-success-fte-worker:v1.0.0
          imagePullPolicy: Always
          
          # Environment variables
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Worker-specific configuration
            - name: WORKER_CONCURRENCY
              value: "5"  # Number of concurrent message processors
            - name: WORKER_PREFETCH_MULTIPLIER
              value: "1"
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
          
          # Health checks for worker
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # Check if worker process is running
                  pgrep -f "message_processor" || exit 1
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # Check if Kafka consumer is connected and processing
                  test -f /tmp/worker_ready || exit 1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Resource limits and requests
          # Workers need more memory for agent processing
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: secrets-volume
              mountPath: /app/secrets
              readOnly: true
          
          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Initiating graceful shutdown..."
                    # Signal worker to stop consuming
                    touch /tmp/worker_shutting_down
                    # Wait for in-flight messages to complete (max 60 seconds)
                    for i in $(seq 1 30); do
                      if test -f /tmp/worker_stopped; then
                        echo "All messages processed"
                        exit 0
                      fi
                      sleep 2
                    done
                    echo "Shutdown timeout - forcing stop"
        
        # Sidecar: Kafka lag exporter for HPA scaling
        - name: kafka-lag-exporter
          image: burrow/kafka-lag-exporter:latest
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fte-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      
      # Volumes
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: secrets-volume
          secret:
            secretName: fte-secrets
            defaultMode: 0400
      
      # Affinity - spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: customer-success-fte
                    component: worker
                topologyKey: kubernetes.io/hostname
        
        # Optional: Prefer nodes with Kafka brokers for lower latency
        # nodeAffinity:
        #   preferredDuringSchedulingIgnoredDuringExecution:
        #     - weight: 50
        #       preference:
        #         matchExpressions:
        #           - key: kafka-broker
        #             operator: In
        #             values:
        #               - "true"
      
      # Termination grace period - longer for workers to finish processing
      terminationGracePeriodSeconds: 60
      
      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "5"

---
# =============================================================================
# WORKER POD DISRUPTION BUDGET
# =============================================================================
# Ensures high availability during voluntary disruptions (node drains, updates)

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fte-worker-pdb
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: worker
spec:
  minAvailable: 1  # Always keep at least 1 worker running
  selector:
    matchLabels:
      app: customer-success-fte
      component: worker
