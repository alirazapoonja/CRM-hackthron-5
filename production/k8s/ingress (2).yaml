---
# =============================================================================
# INGRESS
# =============================================================================
# Routes external traffic to the API service.
# Supports:
# - TLS termination
# - Path-based routing
# - Rate limiting (via annotations)
# - CORS headers
#
# Requires: Ingress Controller (nginx, traefik, ALB, etc.)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fte-ingress
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: nginx
    
    # TLS/SSL Configuration
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "10"
    nginx.ingress.kubernetes.io/limit-rps-burst: "1000"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    
    # CORS Configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://support.company.com,https://app.company.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    
    # Proxy Configuration
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    
    # Health Check
    nginx.ingress.kubernetes.io/health-check-path: "/health"
    nginx.ingress.kubernetes.io/health-check-interval: "30s"
    nginx.ingress.kubernetes.io/health-check-timeout: "5s"
    
    # Webhook-specific Configuration (for Gmail/WhatsApp webhooks)
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # Canary deployment support (uncomment for canary releases)
    # nginx.ingress.kubernetes.io/canary: "true"
    # nginx.ingress.kubernetes.io/canary-weight: "10"
    
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - support-api.company.com
        - webhooks.company.com
      secretName: fte-tls-secret
  
  rules:
    # Main API endpoint
    - host: support-api.company.com
      http:
        paths:
          # Health endpoints (no auth required)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: fte-api
                port:
                  number: 80
          
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: fte-api
                port:
                  number: 80
          
          - path: /live
            pathType: Exact
            backend:
              service:
                name: fte-api
                port:
                  number: 80
          
          # All other API paths
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fte-api
                port:
                  number: 80
    
    # Webhook endpoint (for Gmail, WhatsApp)
    - host: webhooks.company.com
      http:
        paths:
          # Gmail webhook
          - path: /webhooks/gmail
            pathType: Exact
            backend:
              service:
                name: fte-api
                port:
                  number: 80
          
          # WhatsApp webhook
          - path: /webhooks/whatsapp
            pathType: Prefix
            backend:
              service:
                name: fte-api
                port:
                  number: 80

---
