---
# =============================================================================
# SECRETS
# =============================================================================
# Sensitive configuration values for the Customer Success FTE application.
# These should be created from external secret management (Vault, AWS Secrets Manager, etc.)
# or using kubectl create secret commands.
#
# IMPORTANT: In production, use external secret management instead of storing
# secrets directly in YAML files. This is a template showing required secrets.
#
# Create secrets using:
#   kubectl create secret generic fte-secrets \
#     --from-literal=db-password='your-password' \
#     --from-literal=api-key='your-api-key' \
#     --from-file=gmail-credentials.json=/path/to/credentials.json \
#     --from-literal=twilio-account-sid='ACxxxx' \
#     --from-literal=twilio-auth-token='your-token' \
#     --namespace customer-success-fte

apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
type: Opaque
stringData:
  # Database Credentials
  DB_PASSWORD: "changeme-production-password"
  
  # API Security
  API_KEY: "fte-api-key-change-in-production"
  JWT_SECRET: "jwt-secret-change-in-production"
  
  # Gmail API Credentials (OAuth2)
  # GMAIL_CREDENTIALS_JSON: |
  #   {
  #     "type": "service_account",
  #     "project_id": "company-fte-12345",
  #     "private_key_id": "...",
  #     "private_key": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n",
  #     "client_email": "fte@company-fte-12345.iam.gserviceaccount.com",
  #     "client_id": "...",
  #     "auth_uri": "https://accounts.google.com/o/oauth2/auth",
  #     "token_uri": "https://oauth2.googleapis.com/token"
  #   }
  
  # Twilio WhatsApp API Credentials
  TWILIO_ACCOUNT_SID: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TWILIO_AUTH_TOKEN: "changeme-twilio-token"
  
  # WhatsApp Cloud API (Meta) - Alternative to Twilio
  WHATSAPP_CLOUD_API_TOKEN: "changeme-whatsapp-cloud-token"
  WHATSAPP_VERIFY_TOKEN: "changeme-verify-token"
  
  # OpenAI API Key (for the agent)
  OPENAI_API_KEY: "sk-changeme-openai-key"
  
  # Encryption Keys
  ENCRYPTION_KEY: "32-byte-encryption-key-change-me"
  
  # Webhook Secrets
  GMAIL_WEBHOOK_SECRET: "changeme-gmail-webhook-secret"
  TWILIO_WEBHOOK_SECRET: "changeme-twilio-webhook-secret"

---
# =============================================================================
# DOCKER REGISTRY SECRET
# =============================================================================
# For pulling images from private container registry.
# Create using:
#   kubectl create secret docker-registry fte-registry-secret \
#     --docker-server=registry.company.com \
#     --docker-username=fte-user \
#     --docker-password=changeme \
#     --docker-email=devops@company.com \
#     --namespace customer-success-fte

# apiVersion: v1
# kind: Secret
# metadata:
#   name: fte-registry-secret
#   namespace: customer-success-fte
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded-docker-config>

---
# =============================================================================
# TLS SECRET
# =============================================================================
# For HTTPS/TLS termination at the ingress.
# Create using cert-manager or manually:
#   kubectl create secret tls fte-tls-secret \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key \
#     --namespace customer-success-fte

