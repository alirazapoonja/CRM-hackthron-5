---
# =============================================================================
# Docker Compose for Local Development
# =============================================================================
# This file provides a complete local development environment including:
# - FastAPI application
# - Message processor worker
# - PostgreSQL database with pgvector
# - Kafka with Zookeeper
# - Redis (for caching/sessions)
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f            # View logs
#   docker-compose down               # Stop all services
#   docker-compose down -v            # Stop and remove volumes

version: '3.9'

services:
  # ==========================================================================
  # API Service
  # ==========================================================================
  api:
    build:
      context: ..
      dockerfile: production/Dockerfile
      target: api
    image: customer-success-fte-api:local
    container_name: fte-api
    ports:
      - "8000:8000"  # API
      - "9090:9090"  # Metrics
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_LOG_LEVEL=debug
      
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=crm_fte
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      
      # API Security
      - API_KEY=dev-api-key
      
      # Gmail (disabled in local dev by default)
      - GMAIL_CREDENTIALS_PATH=
      - GMAIL_PROJECT_ID=
      
      # WhatsApp (disabled in local dev by default)
      - TWILIO_ACCOUNT_SID=
      - TWILIO_AUTH_TOKEN=
      - TWILIO_WHATSAPP_NUMBER=
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # CORS
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - ../production:/app/production:ro
      - ../context:/app/context:ro
      - ../specs:/app/specs:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Worker Service
  # ==========================================================================
  worker:
    build:
      context: ..
      dockerfile: production/Dockerfile
      target: worker
    image: customer-success-fte-worker:local
    container_name: fte-worker
    environment:
      - APP_ENV=development
      - APP_LOG_LEVEL=debug
      
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=crm_fte
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=fte-processor-local
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ../production:/app/production:ro
      - ../context:/app/context:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - fte-network
    restart: unless-stopped
    deploy:
      replicas: 1  # Scale workers locally if needed

  # ==========================================================================
  # PostgreSQL Database with pgvector
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fte-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crm_fte
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_fte"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================================
  # Kafka with Zookeeper
  # ==========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fte-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - fte-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Redis (Optional - for caching/sessions)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: fte-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fte-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Kafka UI (Optional - for development)
  # ==========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fte-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fte-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - fte-network
    restart: unless-stopped
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

  # ==========================================================================
  # pgAdmin (Optional - for development)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fte-pgadmin
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - fte-network
    restart: unless-stopped
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

# =============================================================================
# Networks
# =============================================================================
networks:
  fte-network:
    driver: bridge
    name: fte-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  logs:
    driver: local
